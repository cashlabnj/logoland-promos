<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9448;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flagGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M 10 6 L 10 18 C 10 26 16 32 24 34 C 32 32 38 26 38 18 L 38 6 Z"
        fill="url(#shieldGradient)"
        stroke="#0d9448"
        stroke-width="0.8"/>

  <!-- Shield border highlight -->
  <path d="M 11 7 L 11 18 C 11 25 16.5 30.5 24 32.5 C 31.5 30.5 37 25 37 18 L 37 7"
        fill="none"
        stroke="#2dd4bf"
        stroke-width="0.5"
        opacity="0.5"/>

  <!-- Stylized "L" inside shield -->
  <g>
    <!-- Vertical bar -->
    <rect x="18" y="11" width="3" height="18" fill="#ffffff" rx="1.5"/>
    <!-- Horizontal bar -->
    <rect x="18" y="26" width="10" height="3" fill="#ffffff" rx="1.5"/>
  </g>

  <!-- Flag/banner -->
  <g>
    <!-- Flag pole -->
    <line x1="28" y1="12" x2="28" y2="20" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <!-- Flag shape -->
    <path d="M 28 12 L 37 8 L 37 17 Z" fill="url(#flagGradient)" stroke="#f59e0b" stroke-width="0.6"/>
    <!-- Flag accent -->
    <line x1="28" y1="12" x2="37" y2="12.5" stroke="#ffffff" stroke-width="0.6" opacity="0.7"/>
  </g>
</svg>