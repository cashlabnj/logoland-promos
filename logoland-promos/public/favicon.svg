<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9448;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flagGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Shield shape - simplified for small size -->
  <path d="M 8 4 L 8 14 C 8 21 13 26 16 27.5 C 19 26 24 21 24 14 L 24 4 Z"
        fill="url(#shieldGradient)"
        stroke="#0d9448"
        stroke-width="0.6"
        stroke-linejoin="round"/>

  <!-- Stylized "L" inside shield -->
  <g>
    <!-- Vertical bar -->
    <rect x="13" y="8" width="2" height="13" fill="#ffffff" rx="1"/>
    <!-- Horizontal bar -->
    <rect x="13" y="19" width="7" height="2" fill="#ffffff" rx="1"/>
  </g>

  <!-- Simplified flag accent -->
  <path d="M 20 9 L 24 7 L 24 13 Z" fill="url(#flagGradient)" stroke="#f59e0b" stroke-width="0.4"/>
</svg>